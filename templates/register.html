<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #dbeafe, #f8fafc);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Card */
form {
    width: 360px;
    background: white;
    padding: 35px;
    border-radius: 18px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.12);
    text-align: center;
    border: 1px solid #e5e7eb;
}

/* Title */
h2 {
    margin-bottom: 20px;
    color: #0f172a;
    font-size: 24px;
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    outline: none;
    background: #f8fafc;
    transition: 0.3s;
    font-size: 14px;
}

input:focus {
    border-color: #3b82f6;
    background: white;
    box-shadow: 0 0 0 4px rgba(59,130,246,0.15);
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(37,99,235,0.3);
}

/* Login link */
a {
    display: block;
    margin-top: 15px;
    color: #2563eb;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
}

a:hover {
    text-decoration: underline;
}
</style>

</head>

<body>

<form method="POST">
    <h2>Create Account</h2>

    <input name="username" placeholder="Username" required>
    <input name="password" type="password" placeholder="Password" required>

    <button type="submit">Register</button>

    <a href="/login">Already have an account? Login</a>
</form>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #f1f5f9;
}

/* Layout */
.container {
    padding: 30px;
}

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.header h2 {
    margin: 0;
    color: #0f172a;
}

.logout {
    background: #ef4444;
    color: white;
    padding: 8px 15px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px;
}

/* Cards */
.cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: 25px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    border: 1px solid #e2e8f0;
}

.card h3 {
    margin: 0;
    font-size: 14px;
    color: #64748b;
}

.card p {
    font-size: 24px;
    font-weight: bold;
    margin-top: 10px;
    color: #0f172a;
}

/* Table */
.table-container {
    background: white;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    border: 1px solid #e2e8f0;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    text-align: left;
    padding: 12px;
    background: #f8fafc;
    color: #334155;
    font-size: 14px;
}

td {
    padding: 12px;
    border-top: 1px solid #e2e8f0;
    font-size: 14px;
    color: #0f172a;
}

tr:hover {
    background: #f1f5f9;
}
</style>
</head>

<body>

<div class="container">

    <!-- Header -->
    <div class="header">
        <h2>Admin Dashboard</h2>
        <a href="/logout" class="logout">Logout</a>
    </div>

    <!-- Stats Cards -->
    <div class="cards">
        <div class="card">
            <h3>Total Users</h3>
            <p>{{ total_users }}</p>
        </div>

        <div class="card">
            <h3>Total Diagnoses</h3>
            <p>{{ total_history }}</p>
        </div>

        <div class="card">
            <h3>Most Common Disease</h3>
            <p>{{ top_disease }}</p>
        </div>
    </div>

    <!-- Table -->
    <div class="table-container">
        <h3>User Activity</h3>

        <table>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Symptoms</th>
                <th>Diagnosis</th>
                <th>Date</th>
            </tr>

            {% for row in data %}
            <tr>
                <td>{{ row[0] }} {{ row[1] }}</td>
                <td>{{ row[2] }}</td>
                <td>{{ row[3] }}</td>
                <td>{{ row[4] }}</td>
                <td>{{ row[5] }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>

</div>

</body>
</html>
